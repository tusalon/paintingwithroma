<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Painting With Roma</title>
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <div class="app-container">
    <!-- Modo Recorte (se muestra al subir imagen) -->
    <div class="crop-mode" id="cropMode">
      <div class="crop-header">
        <button id="cancelCrop" class="text-btn">Cancelar</button>
        <span>Encuadra la imagen</span>
        <button id="confirmCrop" class="text-btn primary">Fijar ✓</button>
      </div>
      <div class="crop-workspace">
        <div class="crop-wrapper" id="cropWrapper">
          <img id="cropImage" draggable="false">
          <div class="crop-overlay"></div>
          <div class="crop-frame" id="cropFrame">
            <div class="crop-handles">
              <div class="handle tl" data-handle="tl"></div>
              <div class="handle tr" data-handle="tr"></div>
              <div class="handle bl" data-handle="bl"></div>
              <div class="handle br" data-handle="br"></div>
            </div>
          </div>
        </div>
        <p class="crop-hint">Pellizca para zoom • Arrastra para mover • Ajusta las esquinas</p>
      </div>
    </div>

    <!-- Modo Trabajo (después de fijar) -->
    <div class="work-mode" id="workMode" style="display: none;">
      <div class="work-header">
        <h1>🎨 Painting With Roma</h1>
        <button id="menuToggle" class="icon-btn">☰</button>
      </div>
      
      <div class="work-workspace" id="workWorkspace">
        <canvas id="imageCanvas"></canvas>
        <canvas id="guideCanvas"></canvas>
      </div>
      
      <div class="work-footer">
        <button id="newImageBtn" class="footer-btn">📸 Nueva</button>
        <button id="resetGuideBtn" class="footer-btn">⟲ Guías</button>
      </div>
      
      <!-- Botones flotantes para guías -->
      <div class="guide-floating">
        <button id="moveGuideBtn" class="fab-guide active" title="Mover guías">✋</button>
      </div>
    </div>

    <!-- Panel de ajustes de guías -->
    <div class="settings-panel" id="settingsPanel">
      <div class="panel-header">
        <span>Ajustes de guía</span>
        <button id="closePanel" class="close-btn">✕</button>
      </div>
      <div class="panel-content">
        <div class="control-row">
          <label>🔵 Círculos:</label>
          <input type="range" id="circles" min="1" max="10" value="4">
          <span id="circlesValue">4</span>
        </div>
        <div class="control-row">
          <label>📏 Espaciado:</label>
          <input type="range" id="spacing" min="50" max="150" value="100">
          <span id="spacingValue">100%</span>
        </div>
        <div class="control-row">
          <label>📐 Tamaño:</label>
          <input type="range" id="circleSize" min="30" max="150" value="100">
          <span id="circleSizeValue">100%</span>
        </div>
        <div class="control-row">
          <label>☀️ Radial:</label>
          <input type="range" id="radialLines" min="0" max="16" value="8">
          <span id="radialLinesValue">8</span>
        </div>
        <div class="control-row">
          <label>📏 Opacidad:</label>
          <input type="range" id="opacity" min="10" max="100" value="60">
          <span id="opacityValue">60%</span>
        </div>
        <div class="control-row">
          <label>🎨 Color:</label>
          <input type="color" id="lineColor" value="#ffffff">
        </div>
        <div class="control-row">
          <label>✏️ Grosor:</label>
          <input type="range" id="lineWidth" min="1" max="4" value="2">
          <span id="lineWidthValue">2</span>
        </div>
        <button id="downloadBtn" class="primary-btn-full">⬇️ Descargar imagen</button>
      </div>
    </div>
  </div>
  
  <input type="file" id="fileInput" accept="image/*" style="display: none;">
  
  <script src="main.js"></script>
</body>
</html>
