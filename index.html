<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111016">
  <meta name="description" content="Gu&iacute;as profesionales para dise&ntilde;o de u&ntilde;as Ballerina en proporci&oacute;n 9:16.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
  <title>Painting With Roma</title>
</head>
<body>
  <main class="app-container" aria-label="Painting With Roma">
    <section id="welcomeScreen" class="welcome-screen" aria-labelledby="appTitle">
      <div class="brand-block">
        <p class="eyebrow">Gu&iacute;as profesionales 9:16</p>
        <h1 id="appTitle">Painting With Roma</h1>
        <p>Prepara referencias Ballerina limpias, centradas y listas para compartir.</p>
      </div>
      <button id="uploadBtn" class="main-upload-btn" type="button">
        <span aria-hidden="true">+</span>
        <span>Seleccionar imagen</span>
      </button>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </section>

    <section class="crop-mode" id="cropMode" aria-label="Recortar imagen" hidden>
      <header class="crop-header">
        <button id="cancelCrop" class="text-btn" type="button">Cancelar</button>
        <span>Encuadre 9:16</span>
        <button id="confirmCrop" class="text-btn primary" type="button">Fijar</button>
      </header>
      <div class="crop-workspace">
        <div class="crop-wrapper" id="cropWrapper">
          <img id="cropImage" alt="Imagen seleccionada para recortar" draggable="false">
          <div class="crop-frame" id="cropFrame" role="group" aria-label="&Aacute;rea de recorte">
            <span class="handle tl" data-handle="tl" aria-hidden="true"></span>
            <span class="handle tr" data-handle="tr" aria-hidden="true"></span>
            <span class="handle bl" data-handle="bl" aria-hidden="true"></span>
            <span class="handle br" data-handle="br" aria-hidden="true"></span>
          </div>
        </div>
      </div>
    </section>

    <section class="work-mode" id="workMode" aria-label="Editar gu&iacute;as" hidden>
      <header class="work-header">
        <button id="backToWelcome" class="icon-btn" type="button" aria-label="Volver al inicio" title="Volver">x</button>
        <div class="work-title">Ballerina 9:16</div>
        <div class="work-actions">
          <button id="toggleSettings" class="icon-btn" type="button" aria-label="Abrir ajustes" title="Ajustes">⚙</button>
          <button id="downloadBtn" class="icon-btn highlight" type="button" aria-label="Descargar imagen" title="Descargar">↓</button>
        </div>
      </header>

      <div class="work-workspace" id="workWorkspace" aria-label="Vista previa de la gu&iacute;a">
        <canvas id="imageCanvas"></canvas>
        <canvas id="guideCanvas"></canvas>
      </div>

      <aside class="settings-panel" id="settingsPanel" aria-label="Ajustes de gu&iacute;a" aria-hidden="true">
        <div class="panel-header">
          <span>Ajustes de gu&iacute;a</span>
          <button class="close-btn" id="closeSettings" type="button" aria-label="Cerrar ajustes">x</button>
        </div>
        <div class="panel-content">
          <section class="control-section">
            <h2>Tipo de gu&iacute;a</h2>
            <div class="segmented-control" role="group" aria-label="Tipo de guia">
              <input type="radio" id="guideModeBallerina" name="guideMode" value="ballerina">
              <label for="guideModeBallerina">Ballerina</label>
              <input type="radio" id="guideModeStructure" name="guideMode" value="structure" checked>
              <label for="guideModeStructure">Estructura</label>
            </div>
          </section>

          <section class="control-section">
            <h2>C&iacute;rculos</h2>
            <div class="control-row">
              <label for="circleSlider">Cantidad</label>
              <input type="range" id="circleSlider" min="2" max="5" value="3">
              <output id="circleCount" for="circleSlider">3</output>
            </div>
          </section>

          <section class="control-section">
            <h2>Estilo</h2>
            <div class="control-row compact">
              <label for="lineColor">Color</label>
              <input type="color" id="lineColor" value="#00d0ff">
            </div>
            <div class="control-row">
              <label for="lineWidth">Grosor</label>
              <input type="range" id="lineWidth" min="1" max="5" value="2">
              <output id="lineWidthValue" for="lineWidth">2</output>
            </div>
            <div class="control-row">
              <label for="opacity">Opacidad</label>
              <input type="range" id="opacity" min="10" max="100" value="80">
              <output id="opacityValue" for="opacity">80%</output>
            </div>
          </section>

          <section class="control-section">
            <h2>Posici&oacute;n</h2>
            <div class="control-row">
              <label for="guideRotation">Rotar</label>
              <input type="range" id="guideRotation" min="-35" max="35" value="0">
              <output id="guideRotationValue" for="guideRotation">0&deg;</output>
            </div>
            <div class="control-row">
              <label for="guideScale">Tama&ntilde;o</label>
              <input type="range" id="guideScale" min="25" max="250" value="100">
              <output id="guideScaleValue" for="guideScale">100%</output>
            </div>
            <button id="moveGuideBtn" class="secondary-btn-full" type="button" aria-pressed="false">Mover gu&iacute;as</button>
            <button id="resetGuidesBtn" class="secondary-btn-full" type="button">Centrar gu&iacute;as</button>
          </section>
        </div>
      </aside>
    </section>
  </main>

  <script src="main.js" defer></script>
</body>
</html>
