<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Painting With Roma</title>
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <div class="fullscreen-app">
    <!-- Barra superior minimalista -->
    <div class="top-bar">
      <h1>🎨 Painting With Roma</h1>
      <button id="menuToggle" class="icon-btn">☰</button>
    </div>

    <!-- Área de trabajo FULLSCREEN -->
    <div class="workspace-full" id="workspace">
      <div class="canvas-full-wrapper">
        <canvas id="originalCanvas"></canvas>
        <canvas id="guideCanvas"></canvas>
      </div>
      
      <!-- Mensaje cuando no hay imagen -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💅</div>
        <p>Toca para seleccionar una imagen</p>
      </div>
      
      <!-- Controles flotantes -->
      <div class="floating-controls">
        <button id="galleryBtn" class="fab">📸</button>
        <button id="resetViewBtn" class="fab small">⟲</button>
      </div>
      
      <!-- Input de archivo oculto -->
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <!-- Panel de ajustes (se desliza desde abajo) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="panel-header">
        <span>Ajustes de guía</span>
        <button id="closePanel" class="close-btn">✕</button>
      </div>
      <div class="panel-content">
        <div class="control-row">
          <label>🔵 Círculos:</label>
          <input type="range" id="circles" min="1" max="10" value="4">
          <span id="circlesValue">4</span>
        </div>
        <div class="control-row">
          <label>📏 Espaciado:</label>
          <input type="range" id="spacing" min="50" max="150" value="100">
          <span id="spacingValue">100%</span>
        </div>
        <div class="control-row">
          <label>📐 Tamaño:</label>
          <input type="range" id="circleSize" min="30" max="150" value="100">
          <span id="circleSizeValue">100%</span>
        </div>
        <div class="control-row">
          <label>☀️ Radial:</label>
          <input type="range" id="radialLines" min="0" max="16" value="8">
          <span id="radialLinesValue">8</span>
        </div>
        <div class="control-row">
          <label>📏 Opacidad:</label>
          <input type="range" id="opacity" min="10" max="100" value="60">
          <span id="opacityValue">60%</span>
        </div>
        <div class="control-row">
          <label>🎨 Color:</label>
          <input type="color" id="lineColor" value="#ffffff">
        </div>
        <div class="control-row">
          <label>✏️ Grosor:</label>
          <input type="range" id="lineWidth" min="1" max="4" value="2">
          <span id="lineWidthValue">2</span>
        </div>
        <button id="downloadBtn" class="primary-btn-full">⬇️ Descargar imagen</button>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
