<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Painting With Roma</title>
</head>
<body>
  <div class="app-container">
    
    <!-- BIENVENIDA -->
    <div id="welcomeScreen" class="welcome-screen">
      <div class="logo-container">
        <h1>Painting With Roma</h1>
        <p>Guías para uñas Ballerina 9:16</p>
      </div>
      <button id="uploadBtn" class="main-upload-btn">
        <span>📷</span> Seleccionar Imagen
      </button>
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <!-- MODO RECORTE -->
    <div class="crop-mode" id="cropMode" style="display: none;">
      <div class="crop-header">
        <button id="cancelCrop" class="text-btn">Cancelar</button>
        <span>Encuadra (9:16)</span>
        <button id="confirmCrop" class="text-btn primary">Fijar ✓</button>
      </div>
      <div class="crop-workspace">
        <div class="crop-wrapper" id="cropWrapper">
          <img id="cropImage" draggable="false">
          <div class="crop-frame" id="cropFrame">
            <div class="handle tl"></div>
            <div class="handle tr"></div>
            <div class="handle bl"></div>
            <div class="handle br"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODO TRABAJO -->
    <div class="work-mode" id="workMode" style="display: none;">
      <div class="work-header">
        <button id="backToWelcome" class="icon-btn">✕</button>
        <div class="work-title">💅 Ballerina 9:16</div>
        <div class="work-actions">
          <button id="toggleSettings" class="icon-btn">⚙️</button>
          <button id="downloadBtn" class="icon-btn highlight">⬇️</button>
        </div>
      </div>
      
      <div class="work-workspace" id="workWorkspace">
        <canvas id="imageCanvas"></canvas>
        <canvas id="guideCanvas"></canvas>
      </div>

      <!-- PANEL DE AJUSTES -->
      <div class="settings-panel" id="settingsPanel">
        <div class="panel-header">
          <span>🎨 Ajustes de Guía</span>
          <button class="close-btn" id="closeSettings">×</button>
        </div>
        <div class="panel-content">
          
          <div class="control-section">
            <h4>⭕ Círculos</h4>
            <div class="circle-control">
              <button id="decreaseCircles">−</button>
              <span id="circleCount">3</span>
              <button id="increaseCircles">+</button>
            </div>
          </div>
          
          <div class="control-section">
            <h4>🎨 Estilo</h4>
            <div class="control-row">
              <label>Color:</label>
              <input type="color" id="lineColor" value="#ffffff">
            </div>
            <div class="control-row">
              <label>Grosor:</label>
              <input type="range" id="lineWidth" min="1" max="5" value="2">
              <span id="lineWidthValue">2</span>
            </div>
            <div class="control-row">
              <label>Opacidad:</label>
              <input type="range" id="opacity" min="10" max="100" value="70">
              <span id="opacityValue">70%</span>
            </div>
          </div>
          
          <div class="control-section">
            <h4>✋ Posición</h4>
            <button id="moveGuideBtn" class="secondary-btn-full">✋ Mover Guías</button>
            <button id="resetGuidesBtn" class="secondary-btn-full">🔄 Centrar Guías</button>
          </div>
          
        </div>
      </div>
    </div>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
